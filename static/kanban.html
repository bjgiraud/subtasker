<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kanban view</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }
    h2 {
      text-align: center;
    }
    .kanban {
      display: flex;
      height: 100vh;
      gap: 1rem;
      padding: 1rem;
      box-sizing: border-box;
    }
    .column {
      flex: 1;
      background-color: #f4f4f4;
      padding: 1rem;
      border-radius: 8px;
      overflow-y: auto;
    }
    .card {
      background: white;
      margin-bottom: 1rem;
      padding: 0.75rem;
      border-radius: 5px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      cursor: grab;
    }
  </style>
</head>
<body>
  <h2>Kanban view</h2>
  <div id="kanban" class="kanban">
    <div class="column" id="todo"><h3>🟦 To do</h3></div>
    <div class="column" id="in-progress"><h3>🟨 In progress</h3></div>
    <div class="column" id="done"><h3>✅ Done</h3></div>
  </div>

  <script src="/static/kanban.js"></script>
</body>
</html>
